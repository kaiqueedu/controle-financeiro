<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head}">
    <title>Controle Financeiro</title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <!-- Mensagem de sucesso -->
        <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${mensagem}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>

        <div class="row mb-4">
            <div class="col">
                <h2><i class="bi bi-people me-2"></i>Pessoas Cadastradas</h2>
                <p class="text-muted">Selecione uma pessoa para gerenciar o controle financeiro</p>
            </div>
            <div class="col-auto d-flex gap-2">
                <a th:href="@{/pessoas/nova}" class="btn btn-primary">
                    <i class="bi bi-person-plus me-1"></i>Nova Pessoa
                </a>
                <a th:href="@{/backup/importar}" class="btn btn-outline-secondary">
                    <i class="bi bi-upload me-1"></i>Importar Dados
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(pessoas)}" class="text-center py-5">
            <i class="bi bi-person-x display-1 text-muted"></i>
            <h4 class="mt-3 text-muted">Nenhuma pessoa cadastrada</h4>
            <p class="text-muted">Cadastre uma pessoa para começar a controlar as finanças</p>
            <a th:href="@{/pessoas/nova}" class="btn btn-primary btn-lg mt-2">
                <i class="bi bi-person-plus me-1"></i>Cadastrar Pessoa
            </a>
        </div>

        <div class="row">
            <div th:each="pessoa : ${pessoas}" class="col-md-4 mb-4">
                <div class="card resumo-card h-100">
                    <div class="card-body text-center">
                        <div class="mb-3">
                            <i class="bi bi-person-circle display-4 text-primary"></i>
                        </div>
                        <h5 class="card-title" th:text="${pessoa.nome}">Nome</h5>
                        <p class="card-text text-muted" th:text="${pessoa.email ?: 'Sem e-mail'}">Email</p>
                        <div class="d-flex gap-2 justify-content-center flex-wrap">
                            <a th:href="@{/controle/{id}(id=${pessoa.id})}" class="btn btn-primary">
                                <i class="bi bi-bar-chart me-1"></i>Controle
                            </a>
                            <a th:href="@{/relatorio/{id}(id=${pessoa.id})}" class="btn btn-info text-white">
                                <i class="bi bi-file-earmark-bar-graph me-1"></i>Relatório
                            </a>
                            <a th:href="@{/cartoes/{id}(id=${pessoa.id})}" class="btn btn-danger">
                                <i class="bi bi-credit-card-2-front me-1"></i>Cartões
                            </a>
                            <a th:href="@{/investimentos/{id}(id=${pessoa.id})}" class="btn text-white" style="background-color: #6f42c1;">
                                <i class="bi bi-graph-up-arrow me-1"></i>Investimentos
                            </a>
                            <a th:href="@{/backup/{id}/exportar(id=${pessoa.id})}" class="btn btn-outline-success btn-sm" title="Exportar dados">
                                <i class="bi bi-download"></i>
                            </a>
                            <a th:href="@{/pessoas/{id}/editar(id=${pessoa.id})}" class="btn btn-outline-secondary btn-sm">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/pessoas/{id}/excluir(id=${pessoa.id})}"
                               class="btn btn-outline-danger btn-sm"
                               onclick="return confirm('Tem certeza que deseja excluir esta pessoa e todos os seus dados financeiros?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
