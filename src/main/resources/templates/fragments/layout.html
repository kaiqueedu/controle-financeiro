<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Navbar Fragment -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-wallet2 me-2"></i>Controle Financeiro
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house-door me-1"></i>Início
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/pessoas/nova}">
                        <i class="bi bi-person-plus me-1"></i>Nova Pessoa
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Head Fragment -->
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f6fa; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .table th { font-weight: 600; }
        .badge-pago { background-color: #28a745; }
        .badge-pendente { background-color: #ffc107; color: #333; }
        .gasto-pago { background-color: #d4edda !important; }
        .gasto-pago td { text-decoration: line-through; color: #155724; }
        .gasto-pago td:last-child { text-decoration: none; }
        .gasto-pago td .badge { text-decoration: none; }
        .resumo-card { transition: transform 0.2s; }
        .resumo-card:hover { transform: translateY(-2px); }
        .vencido { color: #dc3545; font-weight: 600; }
        .btn-nav-mes { min-width: 44px; }
        .collapse-icon { transition: transform 0.2s; }
    </style>
</head>

<!-- Scripts Fragment -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</div>

</html>
