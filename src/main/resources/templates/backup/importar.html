<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head}">
    <title>Importar Dados</title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-upload me-2"></i>Importar Dados</h5>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info small">
                            <i class="bi bi-info-circle me-1"></i>
                            Selecione o arquivo JSON exportado anteriormente.
                            Os dados serão importados como uma nova pessoa.
                        </div>

                        <form action="/backup/importar" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="arquivo" class="form-label">Arquivo de backup (.json)</label>
                                <input type="file" class="form-control" id="arquivo" name="arquivo"
                                       accept=".json" required>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-upload me-1"></i>Importar
                                </button>
                                <a th:href="@{/}" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left me-1"></i>Voltar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
