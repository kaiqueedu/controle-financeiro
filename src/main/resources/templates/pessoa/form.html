<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head}">
    <title>Cadastro de Pessoa</title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-person-plus me-2"></i>
                            <span th:text="${pessoa.id != null ? 'Editar Pessoa' : 'Nova Pessoa'}">Pessoa</span>
                        </h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/pessoas/salvar}" th:object="${pessoa}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="nome" th:field="*{nome}"
                                       th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
                                       placeholder="Nome completo" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" th:field="*{email}"
                                       placeholder="email@exemplo.com">
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg me-1"></i>Salvar
                                </button>
                                <a th:href="@{/}" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left me-1"></i>Voltar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
