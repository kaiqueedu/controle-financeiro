<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head}">
    <title>Editar Valor do Mês</title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header" style="background-color: #e67e22; color: white;">
                        <h5 class="mb-0">
                            <i class="bi bi-pencil-square me-2"></i>Editar Valor do Mês
                        </h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted">
                            <i class="bi bi-person me-1"></i><span th:text="${pessoa.nome}">Nome</span>
                        </p>
                        <div class="alert alert-info small">
                            <i class="bi bi-info-circle me-1"></i>
                            Alterando o valor de <strong th:text="${gasto.descricao}">Gasto</strong>
                            apenas para este mês. O valor base (R$ <span th:text="${#numbers.formatDecimal(gasto.valor, 1, 'POINT', 2, 'COMMA')}">0,00</span>)
                            continua valendo para os outros meses.
                        </div>

                        <form th:action="@{/controle/{pid}/gasto/{id}/valor-mes(pid=${pessoa.id}, id=${gasto.id})}"
                              method="post">
                            <input type="hidden" name="mes" th:value="${mesAtual}">
                            <input type="hidden" name="ano" th:value="${anoAtual}">

                            <div class="mb-3">
                                <label for="valor" class="form-label">Valor para este mês (R$)</label>
                                <input type="number" class="form-control" id="valor" name="valor"
                                       th:value="${valorAtual}" step="0.01" min="0.01" required>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn text-white" style="background-color: #e67e22;">
                                    <i class="bi bi-check-lg me-1"></i>Salvar
                                </button>
                                <a th:href="@{/controle/{id}(id=${pessoa.id}, mes=${mesAtual}, ano=${anoAtual})}"
                                   class="btn btn-secondary">
                                    <i class="bi bi-arrow-left me-1"></i>Voltar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
