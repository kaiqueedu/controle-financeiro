<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head}">
    <title>Gasto</title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-arrow-down-circle me-2"></i>
                            <span th:text="${gasto.id != null ? 'Editar Gasto' : 'Novo Gasto'}">Gasto</span>
                        </h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted">
                            <i class="bi bi-person me-1"></i>
                            <span th:text="${pessoa.nome}">Nome</span>
                        </p>

                        <form th:action="@{/controle/{id}/gasto/salvar(id=${pessoa.id})}"
                              th:object="${gasto}" method="post">
                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" name="mesAtual" th:value="${mesAtual}">
                            <input type="hidden" name="anoAtual" th:value="${anoAtual}">

                            <div class="mb-3">
                                <label for="descricao" class="form-label">Descrição <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="descricao" th:field="*{descricao}"
                                       th:classappend="${#fields.hasErrors('descricao')} ? 'is-invalid'"
                                       placeholder="Ex: Aluguel, Energia, Cartão de Crédito" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}">Erro</div>
                            </div>

                            <div class="mb-3">
                                <label for="valor" class="form-label">Valor (R$) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="valor" th:field="*{valor}"
                                       th:classappend="${#fields.hasErrors('valor')} ? 'is-invalid'"
                                       step="0.01" min="0.01" placeholder="0,00" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}">Erro</div>
                            </div>

                            <div class="mb-3">
                                <label for="diaVencimento" class="form-label">Dia de vencimento <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="diaVencimento" th:field="*{diaVencimento}"
                                       th:classappend="${#fields.hasErrors('diaVencimento')} ? 'is-invalid'"
                                       min="1" max="31" required>
                                <div class="form-text">Dia do mês em que o gasto vence (1 a 31)</div>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('diaVencimento')}" th:errors="*{diaVencimento}">Erro</div>
                            </div>

                            <div class="mb-3">
                                <label for="tipo" class="form-label">Tipo <span class="text-danger">*</span></label>
                                <select class="form-select" id="tipo" th:field="*{tipo}"
                                        th:classappend="${#fields.hasErrors('tipo')} ? 'is-invalid'" required
                                        onchange="toggleOpcoes()">
                                    <option value="">Selecione o tipo</option>
                                    <option th:each="t : ${tipos}" th:value="${t}" th:text="${t.descricao}">Tipo</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}">Erro</div>
                            </div>

                            <!-- Opções para gastos variáveis -->
                            <div id="opcoesVariavel" style="display: none;">
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="recorrente" th:field="*{recorrente}"
                                           onchange="toggleOpcoes()">
                                    <label class="form-check-label" for="recorrente">
                                        <i class="bi bi-arrow-repeat me-1"></i>Recorrente
                                    </label>
                                    <div class="form-text">
                                        Aparece em todos os meses. O valor pode ser editado individualmente por mês.
                                    </div>
                                </div>

                                <div id="parceladoGroup">
                                    <div class="mb-3 form-check">
                                        <input type="checkbox" class="form-check-input" id="parcelado" th:field="*{parcelado}"
                                               onchange="toggleOpcoes()">
                                        <label class="form-check-label" for="parcelado">
                                            <i class="bi bi-layers me-1"></i>Parcelado
                                        </label>
                                        <div class="form-text">
                                            Aparece nos próximos meses conforme o número de parcelas.
                                        </div>
                                    </div>

                                    <div id="parcelasConfig" style="display: none;">
                                        <div class="mb-3">
                                            <label for="totalParcelas" class="form-label">Número de parcelas</label>
                                            <input type="number" class="form-control" id="totalParcelas" th:field="*{totalParcelas}"
                                                   min="2" max="60" placeholder="Ex: 5">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-danger">
                                    <i class="bi bi-check-lg me-1"></i>Salvar
                                </button>
                                <a th:href="@{/controle/{id}(id=${pessoa.id}, mes=${mesAtual}, ano=${anoAtual})}"
                                   class="btn btn-secondary">
                                    <i class="bi bi-arrow-left me-1"></i>Voltar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>

    <script>
        function toggleOpcoes() {
            var tipo = document.getElementById('tipo').value;
            var opcoesVariavel = document.getElementById('opcoesVariavel');
            var recorrente = document.getElementById('recorrente').checked;
            var parcelado = document.getElementById('parcelado').checked;
            var parceladoGroup = document.getElementById('parceladoGroup');
            var parcelasConfig = document.getElementById('parcelasConfig');

            if (tipo === 'FIXO') {
                opcoesVariavel.style.display = 'none';
                document.getElementById('recorrente').checked = true;
                document.getElementById('parcelado').checked = false;
            } else if (tipo === 'VARIAVEL') {
                opcoesVariavel.style.display = 'block';

                // Se recorrente, esconde parcelado
                if (recorrente) {
                    parceladoGroup.style.display = 'none';
                    document.getElementById('parcelado').checked = false;
                    parcelasConfig.style.display = 'none';
                } else {
                    parceladoGroup.style.display = 'block';
                    parcelasConfig.style.display = parcelado ? 'block' : 'none';
                }
            } else {
                opcoesVariavel.style.display = 'none';
            }
        }
        document.addEventListener('DOMContentLoaded', toggleOpcoes);
    </script>
</body>
</html>
