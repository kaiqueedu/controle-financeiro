<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head}">
    <title>Cartão de Crédito</title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-credit-card-2-front me-2"></i>
                            <span th:text="${cartao.id != null ? 'Editar Cartão' : 'Novo Cartão'}">Cartão</span>
                        </h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted"><i class="bi bi-person me-1"></i><span th:text="${pessoa.nome}">Nome</span></p>
                        <form th:action="@{/cartoes/{id}/salvar(id=${pessoa.id})}" th:object="${cartao}" method="post">
                            <input type="hidden" th:field="*{id}">
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome do cartão <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="nome" th:field="*{nome}"
                                       th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
                                       placeholder="Ex: Nubank, Inter, C6" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                            </div>
                            <div class="mb-3">
                                <label for="bandeira" class="form-label">Bandeira</label>
                                <select class="form-select" id="bandeira" th:field="*{bandeira}">
                                    <option value="">Selecione (opcional)</option>
                                    <option value="Visa">Visa</option>
                                    <option value="Mastercard">Mastercard</option>
                                    <option value="Elo">Elo</option>
                                    <option value="American Express">American Express</option>
                                    <option value="Hipercard">Hipercard</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="diaVencimento" class="form-label">Dia de vencimento da fatura <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="diaVencimento" th:field="*{diaVencimento}"
                                       th:classappend="${#fields.hasErrors('diaVencimento')} ? 'is-invalid'"
                                       min="1" max="31" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('diaVencimento')}" th:errors="*{diaVencimento}">Erro</div>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-danger"><i class="bi bi-check-lg me-1"></i>Salvar</button>
                                <a th:href="@{/cartoes/{id}(id=${pessoa.id})}" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Voltar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
